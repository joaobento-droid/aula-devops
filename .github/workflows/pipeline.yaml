name: Pipeline Devops 

on: 
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with: 
          node-version: 22

      - name: Install
        run: npm install 

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }} 

      - name: Build Image
        run: |
          docker build -t magoabacate/aula-devops:1.0 .

      - name: Push Image 
        run: |
          docker push magoabacate/aula-devops:1.0